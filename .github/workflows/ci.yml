name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '*/5 * * * *'

jobs:
  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - run: npm install
      - run: npm run build:shared
      - run: npm run typecheck --workspace=@keylaunch/web-creator --if-present
      - run: npm run typecheck --workspace=@keylaunch/launcher --if-present

  build-web:
    runs-on: ubuntu-latest
    needs: typecheck
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - run: npm install
      - run: npm run build:shared
      - run: npm run build --workspace=@keylaunch/web-creator
        env:
          NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder

  build-launcher:
    runs-on: ubuntu-latest
    needs: typecheck
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - uses: dtolnay/rust-toolchain@stable

      - run: npm install
      - run: npm run build:shared

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: apps/launcher
          args: --no-bundle

  deploy-functions:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push' && secrets.SUPABASE_PROJECT_REF != ''
    needs: typecheck
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1

      - run: supabase functions deploy --project-ref ${{ secrets.SUPABASE_PROJECT_REF }}
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

  scan-queue-cron:
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' && secrets.SUPABASE_URL != ''
    steps:
      - name: Process VirusTotal scan queue
        run: |
          curl -X POST \
            "${{ secrets.SUPABASE_URL }}/functions/v1/process-scan-queue" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY }}" \
            -H "Content-Type: application/json" \
            -d '{}'
